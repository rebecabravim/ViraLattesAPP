<div class="app-layout">
  <app-sidebar></app-sidebar>
  
  <main class="main-content">
    <div class="header">
      <h1>ViraLattes!</h1>
      <div class="subtitle-bar"></div>
    </div>

    <div class="main-box">
      <div class="content-container">
        <div class="search-container">
          <input 
            type="text" 
            placeholder="Pesquisar currículos..." 
            [(ngModel)]="searchTerm"
            (keyup.enter)="onSearch()"
            class="search-input">
          <button 
            class="search-btn" 
            (click)="onSearch()"
            [disabled]="!searchTerm || !searchTerm.trim()">
            🔍 Buscar
          </button>
          <button 
            class="filter-btn" 
            (click)="navigateToCurriculos()">
            Filtros
          </button>
        </div>
   
      </div>
    </div>
   
 
  </main>
</div>
