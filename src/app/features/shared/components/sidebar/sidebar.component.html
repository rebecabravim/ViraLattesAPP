 
<div class="sidebar" [class.collapsed]="!isOpen">
  <div class="sidebar-header">
    <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Alternar menu">
      <span class="material-symbols-outlined paw-icon" [class.rotated]="!isOpen">
        pets
      </span>
    </button>
  </div>
  
  <div class="user-info" *ngIf="isOpen">
    <p class="greeting">Olá, {{ userName }}!</p>
    <div class="menu-section">
      <div class="action-buttons">
        <button class="menu-button" (click)="routeTo('home')">
          <span class="material-symbols-outlined">home</span>
          <span class="menu-text">Home</span>
        </button>
        <button class="menu-button" (click)="routeTo('curriculo')">
          <span class="material-symbols-outlined">search</span>
          <span class="menu-text">Pesquisar</span>
        </button>
        <button class="menu-button" (click)="routeTo('curriculo/meu-curriculo')">
          <span class="material-symbols-outlined">person</span>
          <span class="menu-text">Meu Currículo</span>
        </button>
        <button class="menu-button" (click)="routeTo('curriculo/favoritos')">
          <span class="material-symbols-outlined">favorite</span>
          <span class="menu-text">Favoritos</span>
        </button>
        <button class="menu-button" (click)="routeTo('curriculo/historico')">
          <span class="material-symbols-outlined">history</span>
          <span class="menu-text">Histórico</span>
        </button>
      </div>
    </div>
    
    <div class="logo-section">
      <img src="assets/viraLattes.png" alt="ViraLattes Logo" class="sidebar-logo">
    </div>
    
    <div class="logout-section">
      <button class="logout-button" (click)="logout()">
        <span class="material-symbols-outlined">logout</span>
        <span>Sair</span>
      </button>
    </div>
  </div>
</div>
