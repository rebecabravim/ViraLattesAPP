<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/viraLattes.png" alt="ViraLattes Logo" class="logo-image">
      <h1>Bem-vindo ao ViraLattes</h1>
      <p>Faça login para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">
          <span class="material-symbols-outlined">email</span>
          E-mail
        </label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="seu@email.com" 
          required
        />
      </div>

      <div class="form-group">
        <label for="password">
          <span class="material-symbols-outlined">lock</span>
          Senha
        </label>
        <div class="input-wrapper">
          <input 
            id="password" 
            [type]="hidePassword ? 'password' : 'text'" 
            formControlName="password" 
            placeholder="Digite sua senha" 
            required
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            <span class="material-symbols-outlined">
              {{ hidePassword ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.valid">
        <span class="material-symbols-outlined">login</span>
        Entrar
      </button>

      <div class="divider">
        <span>ou</span>
      </div>

      <button type="button" class="btn-secondary" (click)="goToRegister()">
        <span class="material-symbols-outlined">person_add</span>
        Criar nova conta
      </button>
    </form>
  </div>
</div>
