<div class="filtros-container" [ngClass]="{'expanded': isExpanded}">
  <div class="filtros-header">
    <h3>🔍 Filtros</h3>
    <div class="header-actions">
      <button 
        class="toggle-btn" 
        (click)="toggleFilters()"
        [attr.aria-expanded]="isExpanded">
        {{ isExpanded ? '▲ Ocultar' : '▼ Mostrar' }}
      </button>
    </div>
  </div>

  <div class="filtros-content" *ngIf="isExpanded">

 

      <div class="dropdown-content" *ngIf="isDadosGeraisExpanded">
        <form (ngSubmit)="onApplyFilters()" #filtrosForm="ngForm">
          <!-- Primeira linha:  Nome e Assunto separados -->
          <div class="filtros-row">
            <div class="filtro-item">
              <input 
                type="text" 
                id="nomeValue"
                [(ngModel)]="nomeValue"
                name="nomeValue"
                placeholder="Nome do pesquisador..."
                class="filtro-input">
            </div>

            <div class="filtro-item">
              <input 
                type="text" 
                id="assuntoValue"
                [(ngModel)]="assuntoValue"
                name="assuntoValue"
                placeholder="Assunto (separado por vírgula)..."
                class="filtro-input">
            </div>
          </div>

          <!-- Segunda linha: Checkboxes à esquerda, Seletores à direita -->
          <div class="filtros-row row-grouped">
            <!-- Grupo de checkboxes à esquerda -->
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input 
                  type="checkbox" 
                  [(ngModel)]="filtros.temDoutorado"
                  name="temDoutorado"
                  class="filtro-checkbox">
                <span class="checkmark"></span>
                Doutor
              </label>

              <label class="checkbox-label">
                <input 
                  type="checkbox" 
                  [(ngModel)]="filtros.ehBrasileiro"
                  name="ehBrasileiro"
                  class="filtro-checkbox"
                  (change)="onBrasileiroChange()">
                <span class="checkmark"></span>
                Brasileiro
              </label>
            </div>

            <!-- Grupo de seletores à direita -->
            <div class="selectors-group">
              <select 
                id="paisEspecifico"
                [(ngModel)]="paisSelecionado"
                name="paisSelecionado"
                class="filtro-select select-equal-width"
                (change)="onCountryChange()">
                <option value="" disabled selected hidden>País...</option>
                <option *ngFor="let pais of availableCountries" [value]="pais">{{ pais }}</option>
              </select>

              <select 
                id="anoAPartirDe"
                [(ngModel)]="filtros.anoAPartirDe"
                name="anoAPartirDe"
                class="filtro-select select-equal-width">
                <option value="" disabled selected hidden>Selecione Ano</option>
                <option *ngFor="let ano of availableYears" [value]="ano">{{ ano }}</option>
              </select>
            </div>
          </div>


          <!-- Terceira linha: Linha de Pesquisa e Instituição -->
          <div class="filtros-row">
            <div class="filtro-item">
              <input 
                type="text" 
                id="linhaDePesquisa"
                [(ngModel)]="filtros.linhaDePesquisa"
                name="linhaDePesquisa"
                placeholder="Linha de Pesquisa (Ex: Inteligência Artificial...)"
                class="filtro-input">
            </div>

            <div class="filtro-item">
              <input 
                type="text" 
                id="instituicao"
                [(ngModel)]="filtros.instituicao"
                name="instituicao"
                placeholder="Instituição (Ex: USP, UNICAMP...)"
                class="filtro-input">
            </div>
          </div>

          <!-- Tags de palavras-chave -->
          <div class="palavras-chave-tags" *ngIf="filtros.palavrasChave && filtros.palavrasChave.length > 0">
            <span class="tag" *ngFor="let palavra of filtros.palavrasChave; let i = index">
              {{ palavra }}
              <button type="button" class="remove-tag" (click)="removePalavraChave(i)">×</button>
            </span>
          </div>

          <!-- Botões de ação -->
          <div class="filtros-actions">
            <button type="button" class="btn-secondary" (click)="onClearFilters()">
              🗑️ Limpar Filtros
            </button>
            <button type="submit" class="btn-primary">
              🔍 Buscar com Filtros
            </button>
          </div>
        </form>
      </div>




    </div>

    <!-- Slot para receber outros dropdowns/sections via content projection -->
    <ng-content></ng-content>

  </div>
